<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OOS Statistics</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --acid: #E8FF00; --void: #080010; --purple: #7B2FFF; --soft: #F0E8FF; --pink: #FF2D78; --cyan: #00F5FF; --lime: #39FF14;
    }
    body {
      background: var(--void); color: var(--soft);
      font-family: 'Space Mono', monospace; padding: 20px; margin: 0;
    }
    @media (min-width: 768px) { body { padding: 40px; } }
    #auth-overlay {
      position: fixed; inset: 0; background: var(--void);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 1000; padding: 20px; text-align: center;
    }
    input {
      background: rgba(123, 47, 255, 0.1); border: 1px solid var(--purple);
      padding: 12px; color: var(--soft); font-family: 'Space Mono', monospace;
      width: 100%; margin-bottom: 20px; outline: none;
    }
    button, .btn {
      background: var(--acid); color: var(--void); border: none;
      padding: 12px 24px; cursor: pointer; font-weight: bold; text-transform: uppercase;
      font-family: 'Space Mono', monospace;
    }
    .stats-container { display: none; max-width: 900px; margin: 0 auto; }
    h1 { font-family: 'Syne', sans-serif; color: var(--acid); margin-bottom: 0; }
    h3 { color: var(--acid); margin: 30px 0 15px; font-family: 'Syne', sans-serif; font-size: 16px; }

    .summary-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 30px;
    }
    @media (min-width: 600px) { .summary-grid { grid-template-columns: repeat(4, 1fr); } }
    .stat-card {
      background: rgba(123, 47, 255, 0.08); border: 1px solid rgba(123, 47, 255, 0.2);
      padding: 18px 14px; text-align: center; border-radius: 4px;
    }
    .stat-value {
      font-size: 28px; font-weight: 700; color: var(--acid);
      font-family: 'Syne', sans-serif; line-height: 1;
    }
    .stat-label {
      font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase;
      color: rgba(240,232,255,0.4); margin-top: 8px;
    }

    table {
      width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 30px;
    }
    th {
      text-align: left; padding: 10px 12px; font-size: 9px; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--cyan); border-bottom: 1px solid rgba(123,47,255,0.2);
    }
    td {
      padding: 10px 12px; border-bottom: 1px solid rgba(123,47,255,0.08);
      color: rgba(240,232,255,0.7);
    }
    tr:hover td { background: rgba(123,47,255,0.05); }
    .period-label { color: var(--soft); font-weight: 700; }
    .val-green { color: var(--lime); }
    .val-acid { color: var(--acid); font-weight: 700; }

    .status-badge {
      font-size: 8px; padding: 2px 8px; letter-spacing: 0.1em; text-transform: uppercase; display: inline-block;
    }
    .status-pending { border: 1px solid var(--cyan); color: var(--cyan); }
    .status-handled { border: 1px solid var(--lime); color: var(--lime); }
    .status-canceled { border: 1px solid var(--pink); color: var(--pink); }

    .loader {
      width: 24px; height: 24px; border: 2px solid rgba(123,47,255,0.2);
      border-top: 2px solid var(--acid); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 40px auto; display: block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="auth-overlay">
  <h1>ACCESS RESTRICTED</h1>
  <input type="email" id="admin-email" placeholder="EMAIL" style="max-width:320px;">
  <input type="password" id="admin-pass" placeholder="PASSWORD" style="max-width:320px;" onkeydown="if(event.key==='Enter')doLogin()">
  <button onclick="doLogin()" id="login-btn" style="max-width:320px; width:100%;">LOGIN</button>
  <div id="login-error" style="color:var(--pink); font-size:11px; margin-top:10px; display:none;"></div>
</div>

<div class="stats-container" id="stats-panel">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
    <h1>STATISTICS</h1>
    <div style="display:flex; gap:8px;">
      <a href="oosadmin.html" style="background:rgba(240,232,255,0.1); color:var(--soft); font-size:10px; padding:8px 16px; text-decoration:none; font-family:'Space Mono',monospace; font-weight:bold; text-transform:uppercase;">BACK TO ADMIN</a>
      <button onclick="doLogout()" style="background:rgba(255,45,120,0.15); color:var(--pink); font-size:10px; padding:8px 16px;">LOGOUT</button>
    </div>
  </div>

  <div id="stats-loader"><div class="loader"></div></div>

  <div id="stats-content" style="display:none;">
    <div class="summary-grid" id="summary-cards"></div>

    <h3>SALES BREAKDOWN</h3>
    <table>
      <thead>
        <tr><th>Period</th><th>Orders</th><th>Revenue</th><th>Items Sold</th><th>Avg. Order</th></tr>
      </thead>
      <tbody id="period-table"></tbody>
    </table>

    <h3>TOP SELLING PRODUCTS</h3>
    <table>
      <thead>
        <tr><th>Product</th><th>Units Sold</th><th>Revenue</th></tr>
      </thead>
      <tbody id="products-table"></tbody>
    </table>

    <h3>RECENT ORDERS</h3>
    <table>
      <thead>
        <tr><th>Order</th><th>Date</th><th>Customer</th><th>Total</th><th>Status</th></tr>
      </thead>
      <tbody id="recent-table"></tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://pkddqmbffvvcasngugny.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrZGRxbWJmZnZ2Y2Fzbmd1Z255Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDgzNjgsImV4cCI6MjA5NTgyNDM2OH0.pXjFGs1G_a8cYTAllGZrlIX3ixnkwsH6CUmdaRTJwLY';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  async function doLogin() {
    const email = document.getElementById('admin-email').value.trim();
    const password = document.getElementById('admin-pass').value;
    const errEl = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');
    if (!email || !password) { errEl.textContent = 'Please enter email and password'; errEl.style.display = 'block'; return; }
    btn.disabled = true; btn.textContent = 'LOGGING IN...';
    errEl.style.display = 'none';
    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) {
      errEl.textContent = 'Login failed: ' + error.message;
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'LOGIN';
      return;
    }
    showStats();
  }

  async function doLogout() {
    await supabaseClient.auth.signOut();
    location.reload();
  }

  function showStats() {
    document.getElementById('auth-overlay').style.display = 'none';
    document.getElementById('stats-panel').style.display = 'block';
    loadStats();
  }

  supabaseClient.auth.getSession().then(({ data: { session } }) => {
    if (session) showStats();
  });

  async function loadStats() {
    const { data: orders, error } = await supabaseClient.from('orders').select('*').order('created_at', { ascending: false });
    if (error) { alert('Error loading stats: ' + error.message); return; }

    const active = orders.filter(o => o.status !== 'canceled');
    const now = new Date();
    const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const startOfWeek = new Date(startOfDay);
    startOfWeek.setDate(startOfWeek.getDate() - startOfWeek.getDay());
    const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);

    const totalOrders = active.length;
    const totalRevenue = active.reduce((s, o) => s + (o.total_price || 0), 0);
    const totalItems = active.reduce((s, o) => s + (o.items ? o.items.length : 0), 0);
    const avgOrder = totalOrders > 0 ? (totalRevenue / totalOrders).toFixed(2) : '0';

    document.getElementById('summary-cards').innerHTML =
      card(totalOrders, 'Total Orders') +
      card('$' + totalRevenue, 'Total Revenue') +
      card('$' + avgOrder, 'Avg. Order Value') +
      card(totalItems, 'Items Sold');

    const periods = [
      { label: 'Today', start: startOfDay },
      { label: 'This Week', start: startOfWeek },
      { label: 'This Month', start: startOfMonth },
      { label: 'All Time', start: new Date(0) }
    ];

    let periodHTML = '';
    periods.forEach(p => {
      const filtered = active.filter(o => new Date(o.created_at) >= p.start);
      const rev = filtered.reduce((s, o) => s + (o.total_price || 0), 0);
      const items = filtered.reduce((s, o) => s + (o.items ? o.items.length : 0), 0);
      const avg = filtered.length > 0 ? (rev / filtered.length).toFixed(2) : '0';
      periodHTML += `<tr>
        <td class="period-label">${p.label}</td>
        <td>${filtered.length}</td>
        <td class="val-acid">$${rev}</td>
        <td>${items}</td>
        <td>$${avg}</td>
      </tr>`;
    });
    document.getElementById('period-table').innerHTML = periodHTML;

    const productMap = {};
    active.forEach(o => {
      if (!o.items) return;
      o.items.forEach(item => {
        if (!productMap[item.name]) productMap[item.name] = { count: 0, revenue: 0 };
        productMap[item.name].count++;
        productMap[item.name].revenue += item.price || 0;
      });
    });
    const sorted = Object.entries(productMap).sort((a, b) => b[1].count - a[1].count);
    let productsHTML = '';
    sorted.forEach(([name, data]) => {
      productsHTML += `<tr><td>${name}</td><td>${data.count}</td><td class="val-acid">$${data.revenue}</td></tr>`;
    });
    if (sorted.length === 0) productsHTML = '<tr><td colspan="3" style="opacity:0.4; text-align:center;">No sales yet</td></tr>';
    document.getElementById('products-table').innerHTML = productsHTML;

    const recent = orders.slice(0, 10);
    let recentHTML = '';
    recent.forEach(o => {
      const ref = 'OOS-' + String(o.id).padStart(4, '0');
      const date = new Date(o.created_at).toLocaleDateString();
      const statusClass = o.status === 'handled' ? 'status-handled' : (o.status === 'canceled' ? 'status-canceled' : 'status-pending');
      const statusText = o.status === 'handled' ? 'Handled' : (o.status === 'canceled' ? 'Canceled' : 'Pending');
      recentHTML += `<tr>
        <td style="color:var(--acid)">${ref}</td>
        <td>${date}</td>
        <td>${o.customer_name}</td>
        <td class="val-acid">$${o.total_price}</td>
        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
      </tr>`;
    });
    if (recent.length === 0) recentHTML = '<tr><td colspan="5" style="opacity:0.4; text-align:center;">No orders yet</td></tr>';
    document.getElementById('recent-table').innerHTML = recentHTML;

    document.getElementById('stats-loader').style.display = 'none';
    document.getElementById('stats-content').style.display = 'block';
  }

  function card(value, label) {
    return `<div class="stat-card"><div class="stat-value">${value}</div><div class="stat-label">${label}</div></div>`;
  }
</script>
</body>
</html>
