<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OOS Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --acid: #E8FF00; --void: #080010; --purple: #7B2FFF; --soft: #F0E8FF; --pink: #FF2D78; --cyan: #00F5FF;
    }
    body {
      background: var(--void); color: var(--soft);
      font-family: 'Space Mono', monospace; padding: 20px;
    }
    @media (min-width: 768px) {
      body { padding: 40px; }
    }
    #auth-overlay {
      position: fixed; inset: 0; background: var(--void);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 1000; padding: 20px; text-align: center;
    }
    input, textarea, select {
      background: rgba(123, 47, 255, 0.1); border: 1px solid var(--purple);
      padding: 12px; color: var(--soft); font-family: 'Space Mono', monospace;
      width: 100%; margin-bottom: 20px; outline: none;
    }
    button {
      background: var(--acid); color: var(--void); border: none;
      padding: 12px 24px; cursor: pointer; font-weight: bold; text-transform: uppercase;
    }
    .admin-container { display: none; max-width: 800px; margin: 0 auto; }
    h1 { font-family: 'Syne', sans-serif; color: var(--acid); margin-bottom: 30px; }
    .form-section { background: rgba(255, 255, 255, 0.03); padding: 30px; border-radius: 8px; margin-bottom: 40px; }
    .product-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
    .prod-item { border: 1px solid rgba(240, 232, 255, 0.1); padding: 15px; font-size: 12px; }
    .prod-item img { width: 100%; height: 120px; object-fit: cover; margin-bottom: 10px; }
    .form-grid {
      display: grid; grid-template-columns: 1fr; gap: 0;
    }
    @media (min-width: 600px) {
      .form-grid { grid-template-columns: 1fr 1fr; gap: 20px; }
    }
    .btn-delete {
      background: var(--pink); color: white; border: none; padding: 6px 12px; 
      cursor: pointer; font-family: 'Space Mono', monospace; font-size: 10px; margin-top: 10px;
    }
    .preview-box {
      margin-top: 10px; padding: 10px; border: 1px dashed var(--purple); 
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center; min-height: 60px;
    }
    .order-card {
      background: rgba(255, 255, 255, 0.05);
      border-left: 3px solid var(--cyan);
      padding: 15px;
      margin-bottom: 15px;
      font-size: 11px;
    }
    /* EDIT MODAL STYLES */
    #edit-modal {
      position: fixed; inset: 0; background: rgba(8,0,16,0.95);
      display: none; align-items: flex-start; justify-content: center;
      overflow-y: auto;
      z-index: 2000; padding: 20px;
    }
    .modal-content {
      background: var(--void); border: 1px solid var(--purple);
      padding: 30px; width: 100%; max-width: 500px;
      box-shadow: 0 0 30px rgba(123,47,255,0.2);
      margin: 40px 0;
    }
    .modal-content h3 { color: var(--acid); margin-bottom: 20px; font-family: 'Syne', sans-serif; }
    .modal-actions { display: flex; gap: 10px; margin-top: 10px; }
    .btn-cancel { background: rgba(240,232,255,0.1); color: var(--soft); }
    .loader {
      width: 16px; height: 16px; border: 2px solid rgba(240,232,255,0.1);
      border-top: 2px solid var(--acid); border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block; vertical-align: middle; margin-left: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="auth-overlay">
  <h1>ACCESS RESTRICTED</h1>
  <input type="email" id="admin-email" placeholder="EMAIL" style="max-width:320px;">
  <input type="password" id="admin-pass" placeholder="PASSWORD" style="max-width:320px;" onkeydown="if(event.key==='Enter')doLogin()">
  <button onclick="doLogin()" id="login-btn" style="max-width:320px; width:100%;">LOGIN</button>
  <div id="login-error" style="color:var(--pink); font-size:11px; margin-top:10px; display:none;"></div>
</div>

<div class="admin-container" id="admin-panel">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
    <h1 style="margin-bottom:0;">OOS ADMIN DASHBOARD</h1>
    <div style="display:flex; gap:8px;">
      <a href="oosstats.html" style="background:var(--purple); color:var(--soft); font-size:10px; padding:8px 16px; text-decoration:none; font-family:'Space Mono',monospace; font-weight:bold; text-transform:uppercase; display:inline-block;">STATISTICS</a>
      <button onclick="document.getElementById('reviews-admin').scrollIntoView({behavior:'smooth'})" style="background:rgba(0,245,255,0.15); color:var(--cyan); font-size:10px; padding:8px 16px;">REVIEWS</button>
      <button onclick="doLogout()" style="background:rgba(255,45,120,0.15); color:var(--pink); font-size:10px; padding:8px 16px;">LOGOUT</button>
    </div>
  </div>
  
  <div class="form-section">
    <h3>ADD NEW ITEM</h3>
    <div class="form-grid">
      <div>
        <label>Product Name</label>
        <input type="text" id="p-name" placeholder="Tee, Hoodie, etc.">
        <label>Price ($)</label>
        <input type="number" id="p-price" placeholder="42">
        <label>Category</label>
        <select id="p-cat">
          <option value="Backpacks">Backpacks</option>
          <option value="Patches">Patches</option>
        </select>
        <label>Universe</label>
        <select id="p-universe">
          <option value="mind">OutOfMind (Cyber)</option>
          <option value="era">OutOfEra (Vintage)</option>
        </select>
        <label>Stock / Inventory</label>
        <input type="number" id="p-stock" placeholder="10">
        <label>Limited Edition</label>
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:16px;">
          <input type="checkbox" id="p-limited" style="width:18px; height:18px; accent-color:var(--acid); cursor:pointer;">
          <span style="font-size:10px; color:var(--cyan);">Mark as Limited Edition (time-limited drop)</span>
        </div>
      </div>
      <div>
        <label>Main Image Path</label>
        <input type="text" id="p-thumb" placeholder="images/item1.png" oninput="updateThumbPreview(this.value)">
        <label>Gallery Images (comma separated)</label>
        <input type="text" id="p-gallery" placeholder="img1.png, img2.jpg" oninput="updateGalleryPreview(this.value)">
      </div>
    </div>
    <div class="preview-box">
      <span style="font-size:10px; color:var(--cyan)">LIVE VERIFICATION:</span>
      <img id="thumb-preview" src="" style="height:40px; width:40px; object-fit:cover; display:none;" 
           onload="this.style.display='block'; this.nextElementSibling.style.display='none'" 
           onerror="this.style.display='none'; if(this.src && !this.src.includes('null')) this.nextElementSibling.style.display='block'">
      <span style="font-size:10px; color:var(--pink); display:none;">IMAGE NOT FOUND</span>
      <div id="gallery-previews" style="display:flex; gap:5px;"></div>
    </div>
    <label>Description</label>
    <textarea id="p-desc" rows="4" style="max-width: 100%;" placeholder="Product details..."></textarea>
    <button onclick="addProduct()">ADD TO LIST</button>
  </div>

  <h3>CURRENT INVENTORY <div id="inv-loader" class="loader" style="display:none"></div></h3>
  <div class="product-list" id="inventory"></div>

  <h3 style="margin-top: 50px; color: var(--acid);">RECENT ORDERS <div id="orders-loader" class="loader" style="display:none"></div></h3>
  <div id="orders-list"></div>

  <h3 style="margin-top: 50px; color: rgba(240,232,255,0.4);">ORDER HISTORY</h3>
  <div id="orders-history"></div>

  <h3 style="margin-top: 50px; color: var(--pink);">CANCELLED ORDERS</h3>
  <div id="cancelled-orders"></div>

  <div id="reviews-admin">
    <h3 style="margin-top: 50px; color: var(--cyan);">CUSTOMER REVIEWS <span id="reviews-count" style="font-size:12px; opacity:0.5;"></span></h3>
    <div id="admin-reviews-list"></div>
  </div>
</div>

<!-- EDIT PRODUCT MODAL -->
<div id="edit-modal">
  <div class="modal-content">
    <h3>EDIT PRODUCT</h3>
    <input type="hidden" id="edit-id">
    <label>Product Name</label>
    <input type="text" id="edit-name">
    <label>Price ($)</label>
    <input type="number" id="edit-price">
    <label>Stock</label>
    <input type="number" id="edit-stock">
    <label>Category</label>
    <select id="edit-cat">
      <option value="Backpacks">Backpacks</option>
      <option value="Patches">Patches</option>
    </select>
    <label>Universe</label>
    <select id="edit-universe">
      <option value="mind">OutOfMind (Cyber)</option>
      <option value="era">OutOfEra (Vintage)</option>
    </select>
    <label>Main Image Path</label>
    <input type="text" id="edit-thumb">
    <label>Gallery (comma separated)</label>
    <input type="text" id="edit-gallery">
    <label>Description</label>
    <textarea id="edit-desc" rows="4"></textarea>
    <label>Limited Edition</label>
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:16px;">
      <input type="checkbox" id="edit-limited" style="width:18px; height:18px; accent-color:var(--acid); cursor:pointer;">
      <span style="font-size:10px; color:var(--cyan);">Mark as Limited Edition (time-limited drop)</span>
    </div>
    <div class="modal-actions">
      <button onclick="saveEdit()">SAVE CHANGES</button>
      <button class="btn-cancel" onclick="closeEditModal()">CANCEL</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://pkddqmbffvvcasngugny.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrZGRxbWJmZnZ2Y2Fzbmd1Z255Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDgzNjgsImV4cCI6MjA5NTgyNDM2OH0.pXjFGs1G_a8cYTAllGZrlIX3ixnkwsH6CUmdaRTJwLY';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let allProducts = [];

  async function doLogin() {
    const email = document.getElementById('admin-email').value.trim();
    const password = document.getElementById('admin-pass').value;
    const errEl = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');
    if (!email || !password) { errEl.textContent = 'Please enter email and password'; errEl.style.display = 'block'; return; }
    btn.disabled = true; btn.textContent = 'LOGGING IN...';
    errEl.style.display = 'none';
    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) {
      errEl.textContent = 'Login failed: ' + error.message;
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'LOGIN';
      return;
    }
    showAdminPanel();
  }

  async function doLogout() {
    await supabaseClient.auth.signOut();
    document.getElementById('admin-panel').style.display = 'none';
    document.getElementById('auth-overlay').style.display = 'flex';
    document.getElementById('admin-email').value = '';
    document.getElementById('admin-pass').value = '';
    document.getElementById('login-btn').disabled = false;
    document.getElementById('login-btn').textContent = 'LOGIN';
  }

  function showAdminPanel() {
    document.getElementById('auth-overlay').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    fetchInventory();
    fetchOrders();
    fetchReviews();
  }

  supabaseClient.auth.getSession().then(({ data: { session } }) => {
    if (session) showAdminPanel();
  });

    function updateThumbPreview(val) {
      const img = document.getElementById('thumb-preview');
      img.src = val || '';
      if(!val) { img.style.display = 'none'; img.nextElementSibling.style.display = 'none'; }
    }

    function updateGalleryPreview(val) {
      const container = document.getElementById('gallery-previews');
      container.innerHTML = '';
      if(!val) return;
      const images = val.split(',').map(s => s.trim()).filter(s => s !== "" && s !== "[");
      images.forEach(src => {
        const img = document.createElement('img');
        img.src = src;
        img.style.height = '30px'; img.style.width = '30px'; img.style.objectFit = 'cover';
        img.style.border = '1px solid var(--purple)';
        img.onerror = function() { this.style.borderColor = 'var(--pink)'; };
        container.appendChild(img);
      });
    }

    async function fetchOrders() {
        document.getElementById('orders-loader').style.display = 'inline-block';
        const { data, error } = await supabaseClient.from('orders').select('*').order('created_at', { ascending: false });
        document.getElementById('orders-loader').style.display = 'none';
        if (error) {
            console.error('Error fetching orders:', error);
        } else {
            renderOrders(data);
        }
    }

    function renderOrders(orders) {
        const recentContainer = document.getElementById('orders-list');
        const historyContainer = document.getElementById('orders-history');
        const cancelledContainer = document.getElementById('cancelled-orders');
        recentContainer.innerHTML = '';
        historyContainer.innerHTML = '';
        if (cancelledContainer) cancelledContainer.innerHTML = '';
        
        orders.forEach(order => {
            const itemsSummary = order.items.map(i => i.name).join(', ');
            const date = new Date(order.created_at).toLocaleDateString();
            const isHandled = order.status === 'handled';
            const isCanceled = order.status === 'canceled';
            
            const div = document.createElement('div');
            div.className = 'order-card';
            if (isHandled) div.style.borderLeftColor = 'rgba(240,232,255,0.2)';
            if (isCanceled) div.style.borderLeftColor = 'var(--pink)';

            const orderRef = 'OOS-' + String(order.id).padStart(4, '0');
            const itemsList = order.items.map(i => `${i.name} — $${i.price}`).join('\n');

            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <strong style="color:${isHandled ? 'rgba(240,232,255,0.4)' : (isCanceled ? 'var(--pink)' : 'var(--acid)')}">${orderRef} - ${date}</strong>
                    <strong style="color:var(--cyan)">$${order.total_price}</strong>
                </div>
                <div><strong>Customer:</strong> ${order.customer_name} (${order.phone})</div>
                <div><strong>Address:</strong> ${order.address}</div>
                <div style="margin-top:5px; color:rgba(240,232,255,0.6)"><strong>Items:</strong> ${itemsSummary}</div>
                <div style="display:flex; gap:10px; margin-top:10px; flex-wrap:wrap;">
                    <button onclick="printOrder('${orderRef}', '${order.customer_name}', '${order.phone}', \`${order.address}\`, \`${itemsList.replace(/`/g,'')}\`, ${order.total_price}, '${date}')" style="background:rgba(240,232,255,0.1); color:var(--soft); font-size:9px; padding:6px 12px;">PRINT</button>
                    ${!isHandled && !isCanceled ?
                      `<button onclick="handleOrder('${order.id}')" style="background:var(--purple); font-size:9px; padding:6px 12px;">MARK AS HANDLED</button>`
                      : ''
                    }
                    ${!isCanceled ?
                      `<button onclick="cancelOrder('${order.id}')" style="background:var(--pink); color:white; font-size:9px; padding:6px 12px;">CANCEL ORDER</button>`
                      : `
                      <button onclick="uncancelOrder('${order.id}')" style="background:var(--cyan); color:var(--void); font-size:9px; padding:6px 12px;">UNCANCEL</button>
                      <button onclick="permanentlyDeleteOrder('${order.id}')" style="background:var(--pink); color:white; font-size:9px; padding:6px 12px;">DELETE PERMANENTLY</button>
                      `
                    }
                </div>
            `;
            
            if (isCanceled) {
                if (cancelledContainer) cancelledContainer.appendChild(div);
            } else if (isHandled) {
                historyContainer.appendChild(div);
            } else {
                recentContainer.appendChild(div);
            }
        });
    }

    async function handleOrder(id) {
        const { data: order, error: fetchErr } = await supabaseClient.from('orders').select('*').eq('id', id).single();
        if (fetchErr || !order) { alert('Error fetching order details'); return; }
        const { error } = await supabaseClient.from('orders').update({ status: 'handled' }).eq('id', id);
        if (error) {
            alert('Error updating order: ' + error.message);
        } else {
            fetchOrders();
            const orderRef = 'OOS-' + String(id).padStart(4, '0');
            const name = order.customer_name.split(' ')[0];
            const phone = order.phone.replace(/[^0-9]/g, '');
            const items = order.items.map(i => i.name).join(', ');
            const msg = encodeURIComponent('Hello dear ' + name + '!\n\nGreat news! Your order (' + orderRef + ') has been shipped to your destination.\n\nItems: ' + items + '\nTotal: $' + order.total_price + ' (Cash on Delivery)\n\nEstimated delivery: 3-5 business days.\n\nThank you for shopping with Out of Sight!\nIf you have any questions, feel free to message us here.');
            window.open('https://wa.me/' + phone + '?text=' + msg, '_blank');
        }
    }

    async function cancelOrder(id) {
        if (!confirm('Are you sure you want to cancel this order?')) return;
        console.log('Attempting to cancel order ID:', id);
        const { error } = await supabaseClient.from('orders').update({ status: 'canceled' }).eq('id', id);
        if (error) {
            console.error('Supabase Update Error:', error);
            alert('Error updating order: ' + error.message);
        } else {
            console.log('Order canceled successfully');
            alert('Order marked as canceled!');
            fetchOrders();
        }
    }

    async function uncancelOrder(id) {
        if (!confirm('Restore this order to the recent orders queue?')) return;
        const { error } = await supabaseClient.from('orders').update({ status: null }).eq('id', id);
        if (error) {
            alert('Error updating order: ' + error.message);
        } else {
            alert('Order restored to recent queue!');
            fetchOrders();
        }
    }

    async function permanentlyDeleteOrder(id) {
        if (!confirm('PERMANENTLY DELETE this order record? This cannot be undone and will be removed from the database.')) return;
        console.log('Initiating permanent deletion for Order ID:', id);
        const { error } = await supabaseClient.from('orders').delete().eq('id', id);
        if (error) {
            console.error('Supabase Delete Error:', error);
            alert('Error deleting order: ' + error.message + '. Ensure your Supabase RLS policy allows DELETE.');
        } else {
            console.log('Order deleted successfully from database.');
            fetchOrders();
        }
    }

    function printOrder(ref, name, phone, address, items, total, date) {
      const w = window.open('', '_blank', 'width=400,height=600');
      w.document.write(`<!DOCTYPE html><html><head><title>Order ${ref}</title><style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Courier New', monospace; padding:30px; color:#111; }
        .header { text-align:center; border-bottom:2px solid #111; padding-bottom:15px; margin-bottom:20px; }
        .header h1 { font-size:28px; letter-spacing:0.15em; margin-bottom:4px; }
        .header p { font-size:11px; color:#666; }
        .ref { text-align:center; font-size:20px; font-weight:bold; letter-spacing:0.1em; margin-bottom:20px; }
        .section { margin-bottom:16px; }
        .section-title { font-size:10px; text-transform:uppercase; letter-spacing:0.15em; color:#888; margin-bottom:6px; }
        .section div { font-size:12px; line-height:1.8; }
        .items { border-top:1px dashed #ccc; border-bottom:1px dashed #ccc; padding:10px 0; margin:16px 0; }
        .items div { font-size:12px; line-height:1.8; }
        .total { text-align:right; font-size:18px; font-weight:bold; margin-top:10px; }
        .badges { display:flex; gap:10px; justify-content:center; margin:20px 0; }
        .badge { font-size:10px; padding:4px 12px; border:1px solid #111; text-transform:uppercase; letter-spacing:0.1em; }
        .footer { text-align:center; margin-top:30px; padding-top:15px; border-top:1px solid #ddd; font-size:9px; color:#999; }
        @media print { body { padding:15px; } }
      </style></head><body>
        <div class="header"><h1>OUT OF SIGHT</h1><p>Order Confirmation</p></div>
        <div class="ref">${ref}</div>
        <div class="section"><div class="section-title">Date</div><div>${date}</div></div>
        <div class="section"><div class="section-title">Customer</div><div>${name}</div><div>${phone}</div></div>
        <div class="section"><div class="section-title">Delivery Address</div><div>${address}</div></div>
        <div class="section"><div class="section-title">Items</div><div class="items">${items.split('\n').map(i => '<div>' + i + '</div>').join('')}</div></div>
        <div class="total">TOTAL: $${total}</div>
        <div class="badges"><span class="badge">Cash on Delivery</span><span class="badge">Free Delivery</span></div>
        <div class="footer">Thank you for shopping with Out of Sight<br>Estimated delivery: 3-5 business days</div>
      </body></html>`);
      w.document.close();
      w.onload = function() { w.print(); };
    }

    async function fetchReviews() {
      const { data, error } = await supabaseClient.from('reviews').select('*').order('created_at', { ascending: false });
      const container = document.getElementById('admin-reviews-list');
      const countEl = document.getElementById('reviews-count');
      if (error || !data) { container.innerHTML = '<p style="color:var(--pink); font-size:11px;">Error loading reviews</p>'; return; }
      countEl.textContent = '(' + data.length + ')';
      if (data.length === 0) { container.innerHTML = '<p style="color:rgba(240,232,255,0.3); font-size:11px; font-style:italic;">No reviews yet</p>'; return; }
      container.innerHTML = '';
      data.forEach(r => {
        const stars = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
        const date = new Date(r.created_at).toLocaleDateString();
        const div = document.createElement('div');
        div.className = 'order-card';
        div.style.borderLeftColor = 'var(--cyan)';
        div.innerHTML = '<div style="display:flex; justify-content:space-between; margin-bottom:8px;">' +
          '<strong style="color:var(--acid)">' + r.order_ref + ' — ' + date + '</strong>' +
          '<span style="color:var(--acid); letter-spacing:2px;">' + stars + '</span>' +
        '</div>' +
        '<div style="font-size:11px; color:rgba(240,232,255,0.7); margin-bottom:8px;">' + r.text + '</div>' +
        (r.image_url ? '<img src="' + r.image_url + '" style="max-width:150px; max-height:100px; object-fit:cover; border-radius:3px; margin-bottom:8px;">' : '') +
        '<button onclick="deleteReview(' + r.id + ')" style="background:var(--pink); color:white; font-size:9px; padding:6px 12px;">DELETE REVIEW</button>';
        container.appendChild(div);
      });
    }

    async function deleteReview(id) {
      if (!confirm('Delete this review permanently?')) return;
      const { error } = await supabaseClient.from('reviews').delete().eq('id', id);
      if (error) { alert('Error deleting review: ' + error.message); return; }
      fetchReviews();
    }

    async function fetchInventory() {
        document.getElementById('inv-loader').style.display = 'inline-block';
        const { data, error } = await supabaseClient.from('oos').select('*').order('created_at', { ascending: false });
        document.getElementById('inv-loader').style.display = 'none';
        if (error) {
            console.error('Error fetching inventory:', error);
        } else {
            allProducts = data;
            renderInventory();
        }
    }

    function renderInventory() {
        const container = document.getElementById('inventory');
        container.innerHTML = '';

        allProducts.forEach(p => {
            const div = document.createElement('div');
            div.className = 'prod-item';
            div.innerHTML = `
                <img src="${p.thumb}" onerror="this.src='https://placehold.co/150/080010/F0E8FF?text=OOS'">
                <strong>${p.name}</strong><br>
                $${p.price} | ${p.cat}<br>
                <span style="color:var(--cyan); font-size:10px;">STOCK: ${p.stock || 0}</span><br>
                ${p.limited_edition ? '<span style="color:var(--acid); font-size:9px; letter-spacing:0.1em;">★ LIMITED EDITION</span><br>' : ''}
                <button onclick="openEditModal('${p.id}')" style="background:var(--purple); color:white; border:none; padding:6px 12px; cursor:pointer; font-family:'Space Mono', monospace; font-size:10px; margin-top:10px; width:100%;">EDIT PRODUCT</button>
                <button onclick="deleteProduct('${p.id}')" class="btn-delete" style="width:100%;">DELETE ITEM</button>
            `;
            container.appendChild(div);
        });
    }

    async function addProduct() {
        const name = document.getElementById('p-name').value;
        const priceInput = document.getElementById('p-price').value;
        const price = parseInt(priceInput);
        const stockInput = document.getElementById('p-stock').value;
        const stock = parseInt(stockInput) || 0;
        const baseCat = document.getElementById('p-cat').value;
        const universe = document.getElementById('p-universe').value;
        const thumb = document.getElementById('p-thumb').value.trim();
        const desc = document.getElementById('p-desc').value;
        const galleryStr = document.getElementById('p-gallery').value;
        const limited_edition = document.getElementById('p-limited').checked;

        if (!name || isNaN(price)) {
            alert("Name and a valid Price are required.");
            return;
        }

        // Clean up the images array by removing any empty entries
        const cat = `${baseCat}-${universe}`; // Combine category and universe
        const images = galleryStr ? galleryStr.split(',').map(s => s.trim()).filter(s => s !== "") : [];

        const { error } = await supabaseClient.from('oos').insert([{
            name,
            price,
            stock,
            cat,
            thumb,
            images,
            desc,
            limited_edition,
            created_at: new Date().toISOString()
        }]);

        if (error) {
            alert('Error adding product: ' + error.message);
        } else {
            fetchInventory();
            // Clear form
            document.getElementById('p-name').value = '';
            document.getElementById('p-price').value = '';
            document.getElementById('p-stock').value = '';
            document.getElementById('p-cat').value = '';
            document.getElementById('p-universe').value = 'mind';
            document.getElementById('p-thumb').value = '';
            document.getElementById('p-desc').value = '';
            document.getElementById('p-gallery').value = '';
            document.getElementById('p-limited').checked = false;
            document.getElementById('thumb-preview').style.display = 'none';
            document.getElementById('gallery-previews').innerHTML = '';
        }
    }

    function openEditModal(id) {
        // Fix: Use loose equality (==) because 'id' from HTML attribute is a string
        const p = allProducts.find(item => item.id == id);
        if (!p) return;

        // Deconstruct the category
        const [baseCat, universe] = p.cat.includes('-') ? p.cat.split('-') : [p.cat, 'mind'];

        document.getElementById('edit-id').value = p.id;
        document.getElementById('edit-name').value = p.name;
        document.getElementById('edit-price').value = p.price;
        document.getElementById('edit-stock').value = p.stock || 0;
        
        // Set the dropdowns
        document.getElementById('edit-cat').value = baseCat;
        document.getElementById('edit-universe').value = universe;

        document.getElementById('edit-thumb').value = p.thumb || '';
        document.getElementById('edit-gallery').value = Array.isArray(p.images) ? p.images.join(', ') : (p.images || '');
        document.getElementById('edit-desc').value = p.desc || '';
        document.getElementById('edit-limited').checked = p.limited_edition === true;

        document.getElementById('edit-modal').style.display = 'flex';
    }

    function closeEditModal() {
        document.getElementById('edit-modal').style.display = 'none';
    }

    async function saveEdit() {
        const id = parseInt(document.getElementById('edit-id').value);
        const name = document.getElementById('edit-name').value;
        const price = parseInt(document.getElementById('edit-price').value);
        const stock = parseInt(document.getElementById('edit-stock').value);
        const baseCat = document.getElementById('edit-cat').value;
        const universe = document.getElementById('edit-universe').value;
        const thumb = document.getElementById('edit-thumb').value.trim();
        const galleryStr = document.getElementById('edit-gallery').value;
        const desc = document.getElementById('edit-desc').value;
        const limited_edition = document.getElementById('edit-limited').checked;

        if (!name || isNaN(price)) {
            alert("Name and valid Price are required.");
            return;
        }

        const cat = `${baseCat}-${universe}`; // Re-combine category and universe
        const images = galleryStr ? galleryStr.split(',').map(s => s.trim()).filter(s => s !== "") : [];

        console.log('Saving changes for ID:', id, { name, price, stock, cat, thumb, images });

        const { data, error } = await supabaseClient.from('oos')
            .update({ name, price, stock, cat, thumb, images, desc, limited_edition })
            .eq('id', id);

        if (error) {
            console.error('Supabase Update Error:', error);
            alert('Error updating product: ' + error.message);
        } else {
            console.log('Update successful:', data);
            closeEditModal();
            await fetchInventory(); // Refresh list to show changes
        }
    }

    async function deleteProduct(id) {
        if (!confirm('Are you sure you want to delete this item?')) return;

        const { error } = await supabaseClient.from('oos').delete().eq('id', id);
        if (error) {
            alert('Error deleting product: ' + error.message);
        } else {
            fetchInventory();
        }
    }

  // Allow Enter key for password
  document.getElementById('pass-input').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') checkPassword();
  });
</script>
</body>
</html>
